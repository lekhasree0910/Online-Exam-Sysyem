<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexExam | Student Registration</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <i class="fa-solid fa-graduation-cap"></i> NexExam
        </a>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Home</a></li>
            <li><a href="exams.html" class="nav-link"><i class="fa-solid fa-file-signature"></i> Exams</a></li>
        </ul>
        <div class="user-profile-nav">
            <a href="login.html" class="nav-btn-outline"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
        </div>
    </nav>

    <main class="container">
        <div class="card form-card">
            <div class="section-header" style="margin-bottom: 2rem;">
                <h2 class="section-title" style="font-size: 1.75rem;">Create Account</h2>
                <p class="section-desc">Register as a student to join online exams.</p>
            </div>

            <form id="register-form">
                <div class="form-group">
                    <label class="form-label" for="reg-name">Full Name</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);">
                            <i class="fa-solid fa-user"></i>
                        </span>
                        <input type="text" id="reg-name" class="form-control" style="padding-left: 2.75rem;" placeholder="Rahul Sharma" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg-email">Email Address</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);">
                            <i class="fa-solid fa-envelope"></i>
                        </span>
                        <input type="email" id="reg-email" class="form-control" style="padding-left: 2.75rem;" placeholder="rahul@gmail.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg-phone">Phone Number</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);">
                            <i class="fa-solid fa-phone"></i>
                        </span>
                        <input type="tel" id="reg-phone" class="form-control" style="padding-left: 2.75rem;" placeholder="9876543210" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg-college">College / Institution</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);">
                            <i class="fa-solid fa-school"></i>
                        </span>
                        <input type="text" id="reg-college" class="form-control" style="padding-left: 2.75rem;" placeholder="ABC Engineering College" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg-password">Password</label>
                    <div style="position: relative;">
                        <span style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" id="reg-password" class="form-control" style="padding-left: 2.75rem;" placeholder="Minimum 6 characters" required>
                    </div>
                </div>

                <button type="submit" class="nav-btn submit-btn">
                    <i class="fa-solid fa-user-plus"></i> Register
                </button>
            </form>

            <div class="form-footer">
                Already registered? <a href="login.html" class="form-link">Sign In here</a>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 NexExam. All rights reserved.</p>
        </div>
    </footer>

    <div class="notification-container" id="notification-container"></div>

    <script src="script.js"></script>
</body>
</html>
